name: Trigger Smoke Tests

on:
  pull_request:
    branches:
      - main

jobs:
  trigger-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Automation Repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/sumamsebastian2647-rgb/automation-testing/dispatches \
            -d '{
              "event_type": "run-cloudemy-smoke",
              "client_payload": {
                "sha": "${{ github.sha }}",
                "repo": "${{ github.repository }}"
              }
            }'
