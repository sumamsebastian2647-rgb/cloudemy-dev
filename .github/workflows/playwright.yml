name: Playwright Smoke Test

on:
  repository_dispatch:
    types: [run-smoke]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout GitHub repo (workflow repo)
      - name: Checkout Workflow Repo
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Clone Bitbucket Test Repo
      - name: Clone Bitbucket Automation Repo
        run: |
          git clone https://${{ secrets.BB_USERNAME }}:${{ secrets.BB_APP_PASSWORD }}@bitbucket.org/cloudemycomau/automation-testing.git
          cd automation-testing
          npm ci
          npx playwright install --with-deps
          npx playwright test --grep "@smoke"

      # Upload Report
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: automation-testing/playwright-report/
